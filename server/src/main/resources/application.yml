server:
  port: 8080
  servlet:
    context-path: /api
spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id
ems:
  jwt:
    # 移除默认值,强制必须通过环境变量 EMS_JWT_SECRET 配置,避免密钥硬编码泄露
    secret: ${EMS_JWT_SECRET}
    expire: 86400
    header: Authorization
    prefix: "Bearer "
