server:
  port: 8080
  servlet:
    context-path: /api
spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id
ems:
  jwt:
    secret: ems-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
    expire: 86400
    header: Authorization
    prefix: "Bearer "
