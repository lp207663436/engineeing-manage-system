spring:
  datasource:
    # TODO: 生产环境必须使用 useSSL=true 并移除 allowPublicKeyRetrieval;开发环境内网可保留 useSSL=false
    url: jdbc:mysql://192.168.12.157:19980/engine_manage?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=false
    username: root
    # 移除默认值,强制从环境变量读取;开发环境默认密码见注释:Abc123++
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 192.168.12.157
      port: 6379
      # 开发环境密码可为空,但配置项必须存在;生产环境必须配置 REDIS_PASSWORD
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 5s
        shutdown-timeout: 200ms
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
